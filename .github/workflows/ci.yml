name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv sync --locked --group test
      - name: Run unit tests
        run: uv run pytest -s -vv
